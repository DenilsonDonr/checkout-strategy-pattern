services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkout-strategy-pattern-app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - checkout-strategy-pattern
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: checkout-strategy-pattern-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - checkout-strategy-pattern
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: checkout-strategy-pattern-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: checkout-strategy-pattern
      POSTGRES_USER: checkout-strategy-pattern_user
      POSTGRES_PASSWORD: secret
      POSTGRES_MULTIPLE_DATABASES: checkout-strategy-pattern,checkout-strategy-pattern_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - checkout-strategy-pattern

networks:
  checkout-strategy-pattern:
    driver: bridge

volumes:
  postgres_data:
    driver: local
